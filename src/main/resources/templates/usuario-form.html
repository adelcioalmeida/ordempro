<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CADASTRO DE USUÁRIO</title>

    <link rel="stylesheet" th:href="@{/css/sistema.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-logo">
            <img class="logo-imagem" th:src="@{/img/logo.png}" alt="Logo OrdemPro">
        </div>

        <nav class="sidebar-menu">

            <a class="sidebar-link home-link" th:href="@{/ordens}">
                <i class="bi bi-house-door-fill"></i>
                HOME
            </a>

            <div class="menu-group" sec:authorize="hasAnyRole('ADMIN', 'GERENTE')">
                <button type="button" class="menu-toggle active" onclick="alternarSubmenu('submenu-cadastro')">
                    <i class="bi bi-person-plus-fill"></i>
                    CADASTRO
                </button>

                <div id="submenu-cadastro" class="submenu">
                    <a class="submenu-link" th:href="@{/clientes}">
                        <i class="bi bi-person-vcard"></i>
                        CLIENTE
                    </a>

                    <a class="submenu-link" th:href="@{/cidades}">
                        <i class="bi bi-geo-alt-fill"></i>
                        CIDADE
                    </a>

                    <a class="submenu-link active"
                       sec:authorize="hasRole('ADMIN')"
                       th:href="@{/usuarios}">
                        <i class="bi bi-person-gear"></i>
                        USUÁRIO
                    </a>
                </div>
            </div>

            <div class="menu-group">
                <button type="button" class="menu-toggle" onclick="alternarSubmenu('submenu-ordens')">
                    <i class="bi bi-clipboard-check-fill"></i>
                    ORDENS DE SERVIÇO
                </button>

                <div id="submenu-ordens" class="submenu">
                    <a class="submenu-link" th:href="@{/ordens}">
                        <i class="bi bi-search"></i>
                        BUSCA
                    </a>

                    <a class="submenu-link" th:href="@{/ordens/nova}">
                        <i class="bi bi-plus-circle-fill"></i>
                        NOVA
                    </a>
                </div>
            </div>

            <a class="sidebar-link sair-link" th:href="@{/logout}">
                <i class="bi bi-box-arrow-right"></i>
                SAIR
            </a>

        </nav>

        <div class="sidebar-user-card">
            <button type="button"
                    class="sidebar-user-button"
                    onclick="abrirModalAlterarSenha()"
                    title="Alterar minha senha">
                <div class="sidebar-user-info">
                    <i class="bi bi-person-circle"></i>

                    <div>
                        <span class="sidebar-user-name"
                              th:text="${usuarioLogadoNome + ' • ' + usuarioLogadoPerfil}">
                            USUÁRIO • PERFIL
                        </span>

                        <span class="sidebar-user-profile">
                            Clique para alterar senha
                        </span>
                    </div>
                </div>

                <i class="bi bi-three-dots-vertical"></i>
            </button>
        </div>
    </aside>

    <main class="main-content">
        <section class="content-card">

            <div class="page-header">
                <div>
                    <h1 class="page-title"
                        th:text="${usuario.idUsuario != null ? 'EDIÇÃO DE USUÁRIO' : 'CADASTRO DE USUÁRIO'}">
                        CADASTRO DE USUÁRIO
                    </h1>

                    <p class="page-subtitle"
                       th:text="${usuario.idUsuario != null ? 'ATUALIZE OS DADOS DO USUÁRIO DO SISTEMA' : 'PREENCHA OS DADOS PARA CADASTRAR UM NOVO USUÁRIO'}">
                        PREENCHA OS DADOS PARA CADASTRAR UM NOVO USUÁRIO
                    </p>
                </div>

                <a class="secondary-button" th:href="@{/usuarios}">
                    <i class="bi bi-arrow-left-circle"></i>
                    VOLTAR
                </a>
            </div>

            <div th:if="${sucesso}" class="alerta alerta-sucesso">
                <i class="bi bi-check-circle-fill"></i>
                <span th:text="${sucesso}">Mensagem de sucesso</span>
            </div>

            <div th:if="${erro}" class="alerta alerta-erro">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span th:text="${erro}">Mensagem de erro</span>
            </div>

            <form th:action="@{/usuarios/salvar}" th:object="${usuario}" method="post" class="filtro-form">
                <input type="hidden" th:field="*{idUsuario}">

                <div class="form-section">
                    <h2 class="section-title">DADOS DO USUÁRIO</h2>

                    <div class="form-grid">

                        <div class="form-group">
                            <label class="form-label" for="nome">NOME COMPLETO</label>
                            <input class="form-input"
                                   type="text"
                                   id="nome"
                                   th:field="*{nome}"
                                   placeholder="Digite o nome do usuário"
                                   required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="email">E-MAIL</label>
                            <input class="form-input"
                                   type="email"
                                   id="email"
                                   th:field="*{email}"
                                   placeholder="Digite o e-mail"
                                   required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="telefone">TELEFONE</label>
                            <input class="form-input"
                                   type="text"
                                   id="telefone"
                                   th:field="*{telefone}"
                                   inputmode="numeric"
                                   maxlength="15"
                                   placeholder="(00) 00000-0000">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="senhaHash">SENHA</label>

                            <div class="senha-wrapper">
                                <input class="form-input campo-senha"
                                       type="password"
                                       id="senhaHash"
                                       th:field="*{senhaHash}"
                                       th:placeholder="${usuario.idUsuario != null ? 'Deixe em branco para manter a senha atual' : 'Digite a senha'}">

                                <button type="button"
                                        class="botao-olho"
                                        onclick="toggleSenha()"
                                        aria-label="Mostrar ou ocultar senha">
                                    <i id="iconeSenha" class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="funcao">FUNÇÃO</label>

                            <select class="form-select" id="funcao" th:field="*{funcao}" required>
                                <option value="">SELECIONE UMA FUNÇÃO</option>

                                <option th:each="funcao : ${funcoes}"
                                        th:value="${funcao.idFuncao}"
                                        th:text="${funcao.nome}">
                                </option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="ativo">STATUS</label>

                            <select class="form-select" id="ativo" th:field="*{ativo}">
                                <option th:value="true">ATIVO</option>
                                <option th:value="false">INATIVO</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="primary-button">
                        <i class="bi bi-check-circle"></i>
                        <span th:text="${usuario.idUsuario != null ? 'ATUALIZAR USUÁRIO' : 'SALVAR USUÁRIO'}">
                            SALVAR USUÁRIO
                        </span>
                    </button>

                    <a class="secondary-button" th:href="@{/usuarios}">
                        <i class="bi bi-x-circle"></i>
                        CANCELAR
                    </a>
                </div>
            </form>

        </section>
    </main>
</div>

<div id="modalAlterarSenha" class="modal-senha-overlay">
    <div class="modal-senha-card">
        <div class="modal-senha-header">
            <h2>ALTERAR SENHA</h2>

            <button type="button"
                    class="modal-senha-fechar"
                    onclick="fecharModalAlterarSenha()"
                    aria-label="Fechar janela de alteração de senha">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>

        <form th:action="@{/usuarios/alterar-senha}" method="post" class="modal-senha-form">
            <div class="form-group">
                <label class="form-label" for="senhaAtual">SENHA ATUAL</label>
                <input class="form-input"
                       type="password"
                       id="senhaAtual"
                       name="senhaAtual"
                       placeholder="Digite sua senha atual"
                       required>
            </div>

            <div class="form-group">
                <label class="form-label" for="novaSenha">NOVA SENHA</label>
                <input class="form-input"
                       type="password"
                       id="novaSenha"
                       name="novaSenha"
                       minlength="6"
                       placeholder="Digite a nova senha"
                       required>
            </div>

            <div class="form-group">
                <label class="form-label" for="confirmacaoSenha">CONFIRMAR NOVA SENHA</label>
                <input class="form-input"
                       type="password"
                       id="confirmacaoSenha"
                       name="confirmacaoSenha"
                       minlength="6"
                       placeholder="Confirme a nova senha"
                       required>
            </div>

            <div class="modal-senha-actions">
                <button type="submit" class="primary-button">
                    <i class="bi bi-check-circle"></i>
                    SALVAR SENHA
                </button>

                <button type="button"
                        class="secondary-button"
                        onclick="fecharModalAlterarSenha()">
                    <i class="bi bi-x-circle"></i>
                    CANCELAR
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    function abrirModalAlterarSenha() {
        const modal = document.getElementById('modalAlterarSenha');

        if (modal) {
            modal.classList.add('ativo');
        }
    }

    function fecharModalAlterarSenha() {
        const modal = document.getElementById('modalAlterarSenha');

        if (modal) {
            modal.classList.remove('ativo');
        }
    }

    document.addEventListener('keydown', function (event) {
        if (event.key === 'Escape') {
            fecharModalAlterarSenha();
        }
    });

    document.addEventListener('click', function (event) {
        const modal = document.getElementById('modalAlterarSenha');
        const card = document.querySelector('.modal-senha-card');

        if (modal && card && modal.classList.contains('ativo')) {
            const clicouForaDoCard = modal.contains(event.target) && !card.contains(event.target);

            if (clicouForaDoCard) {
                fecharModalAlterarSenha();
            }
        }
    });
</script>

<script th:src="@{/js/sistema.js}"></script>
</body>
</html>
