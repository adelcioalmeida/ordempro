<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USUÁRIOS</title>

    <link rel="stylesheet" th:href="@{/css/sistema.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-logo">
            <img class="logo-imagem" th:src="@{/img/logo.png}" alt="Logo OrdemPro">
        </div>

        <nav class="sidebar-menu">

            <a class="sidebar-link home-link" th:href="@{/ordens}">
                <i class="bi bi-house-door-fill"></i>
                HOME
            </a>

            <div class="menu-group" sec:authorize="hasAnyRole('ADMIN', 'GERENTE')">
                <button type="button" class="menu-toggle active" onclick="alternarSubmenu('submenu-cadastro')">
                    <i class="bi bi-person-plus-fill"></i>
                    CADASTRO
                </button>

                <div id="submenu-cadastro" class="submenu">
                    <a class="submenu-link" th:href="@{/clientes}">
                        <i class="bi bi-person-vcard"></i>
                        CLIENTE
                    </a>

                    <a class="submenu-link" th:href="@{/cidades}">
                        <i class="bi bi-geo-alt-fill"></i>
                        CIDADE
                    </a>

                    <a class="submenu-link active"
                       sec:authorize="hasRole('ADMIN')"
                       th:href="@{/usuarios}">
                        <i class="bi bi-person-gear"></i>
                        USUÁRIO
                    </a>
                </div>
            </div>

            <div class="menu-group">
                <button type="button" class="menu-toggle" onclick="alternarSubmenu('submenu-ordens')">
                    <i class="bi bi-clipboard-check-fill"></i>
                    ORDENS DE SERVIÇO
                </button>

                <div id="submenu-ordens" class="submenu">
                    <a class="submenu-link" th:href="@{/ordens}">
                        <i class="bi bi-search"></i>
                        BUSCA
                    </a>

                    <a class="submenu-link" th:href="@{/ordens/nova}">
                        <i class="bi bi-plus-circle-fill"></i>
                        NOVA
                    </a>
                </div>
            </div>

            <a class="sidebar-link sair-link" th:href="@{/logout}">
                <i class="bi bi-box-arrow-right"></i>
                SAIR
            </a>

        </nav>

        <div class="sidebar-user-card">
            <div class="sidebar-user-info">
                <i class="bi bi-person-circle"></i>

                <div>
                    <span class="sidebar-user-name"
                          th:text="${usuarioLogadoNome + ' • ' + usuarioLogadoPerfil}">
                        USUÁRIO • PERFIL
                    </span>

                    <span class="sidebar-user-profile">
                        Perfil:
                        <strong th:text="${usuarioLogadoPerfil}">PERFIL</strong>
                    </span>
                </div>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <section class="content-card">

            <div class="page-header">

                <div>
                    <h1 class="page-title">USUÁRIOS CADASTRADOS</h1>
                </div>

                <a class="primary-button" th:href="@{/usuarios/novo}">
                    <i class="bi bi-plus-circle"></i>
                    NOVO USUÁRIO
                </a>
            </div>

            <div th:if="${sucesso}" class="alerta alerta-sucesso" th:text="${sucesso}"></div>
            <div th:if="${erro}" class="alerta alerta-erro" th:text="${erro}"></div>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>NOME</th>
                        <th>E-MAIL</th>
                        <th>TELEFONE</th>
                        <th>FUNÇÃO</th>
                        <th>ATIVO</th>
                        <th>AÇÕES</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="usuario : ${usuarios}">
                        <td th:text="${usuario.idUsuario}"></td>
                        <td th:text="${usuario.nome}"></td>
                        <td th:text="${usuario.email}"></td>
                        <td th:text="${usuario.telefone}"></td>
                        <td th:text="${usuario.funcao != null ? usuario.funcao.nome : 'NÃO INFORMADA'}"></td>
                        <td th:text="${usuario.ativo != null && usuario.ativo ? 'SIM' : 'NÃO'}"></td>
                        <td>
                            <div class="acoes-tabela">

                                <a class="action-icon edit-icon"
                                   th:href="@{/usuarios/editar/{id}(id=${usuario.idUsuario})}"
                                   title="EDITAR">
                                    <i class="bi bi-pencil-square"></i>
                                </a>

                                <a th:if="${emailUsuarioLogado == null or !emailUsuarioLogado.equalsIgnoreCase(usuario.email)}"
                                   class="action-icon delete-icon"
                                   th:href="@{/usuarios/excluir/{id}(id=${usuario.idUsuario})}"
                                   onclick="return confirm('Tem certeza que deseja excluir este usuário?')"
                                   title="EXCLUIR">
                                    <i class="bi bi-trash-fill"></i>
                                </a>

                                <span th:if="${emailUsuarioLogado != null and emailUsuarioLogado.equalsIgnoreCase(usuario.email)}"
                                      class="action-icon delete-icon"
                                      title="USUÁRIO LOGADO NÃO PODE SER EXCLUÍDO"
                                      style="opacity: 0.35; cursor: not-allowed;">
                                    <i class="bi bi-trash-fill"></i>
                                </span>

                            </div>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(usuarios)}">
                        <td colspan="7" class="empty-message">
                            NENHUM USUÁRIO CADASTRADO.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </section>
    </main>
</div>

<script th:src="@{/js/sistema.js}"></script>
</body>
</html>
