<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>CADASTRO CLIENTE</title>

    <link rel="stylesheet" th:href="@{/css/sistema.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script th:src="@{/js/sistema.js}" defer></script>
</head>

<body>

<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-logo">
            <img class="logo-imagem" th:src="@{/img/logo.png}" alt="Logo OrdemPro">
        </div>

        <nav class="sidebar-menu">

            <a class="sidebar-link home-link" th:href="@{/ordens}">
                <i class="bi bi-house-door-fill"></i>
                HOME
            </a>

            <div class="menu-group" sec:authorize="hasAnyRole('ADMIN', 'GERENTE', 'VENDEDOR')">
                <button class="menu-toggle active" type="button" onclick="alternarSubmenu('submenu-cadastro')">
                    <i class="bi bi-person-plus-fill"></i>
                    CADASTRO
                </button>

                <div id="submenu-cadastro" class="submenu">
                    <a class="submenu-link active" th:href="@{/clientes}">
                        <i class="bi bi-person-vcard"></i>
                        CLIENTE
                    </a>

                    <a class="submenu-link"
                       sec:authorize="hasAnyRole('ADMIN', 'GERENTE')"
                       th:href="@{/cidades}">
                        <i class="bi bi-geo-alt-fill"></i>
                        CIDADE
                    </a>

                    <a class="submenu-link"
                       sec:authorize="hasRole('ADMIN')"
                       th:href="@{/usuarios}">
                        <i class="bi bi-person-gear"></i>
                        USUÁRIO
                    </a>
                </div>
            </div>

            <div class="menu-group">
                <button type="button" class="menu-toggle" onclick="alternarSubmenu('submenu-ordens')">
                    <i class="bi bi-clipboard-check-fill"></i>
                    ORDENS DE SERVIÇO
                </button>

                <div id="submenu-ordens" class="submenu">
                    <a class="submenu-link" th:href="@{/ordens}">
                        <i class="bi bi-search"></i>
                        BUSCA
                    </a>

                    <a class="submenu-link" th:href="@{/ordens/nova}">
                        <i class="bi bi-plus-circle-fill"></i>
                        NOVA
                    </a>
                </div>
            </div>

            <a class="sidebar-link sair-link" th:href="@{/logout}">
                <i class="bi bi-box-arrow-right"></i>
                SAIR
            </a>

        </nav>

        <div class="sidebar-user-card">
            <div class="sidebar-user-info">
                <i class="bi bi-person-circle"></i>

                <div>
                    <span class="sidebar-user-name"
                          th:text="${usuarioLogadoNome + ' • ' + usuarioLogadoPerfil}">
                        USUÁRIO • PERFIL
                    </span>

                    <span class="sidebar-user-profile">
                        Perfil:
                        <strong th:text="${usuarioLogadoPerfil}">PERFIL</strong>
                    </span>
                </div>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <div class="content-card">

            <div class="page-header">

                <div>
                    <h1 class="page-title"
                        th:text="${cliente.idCliente != null ? 'EDIÇÃO DE CLIENTE' : 'CADASTRO DE CLIENTE'}">
                        CADASTRO DE CLIENTE
                    </h1>
                </div>

                <a th:href="@{/clientes}" class="secondary-button">
                    <i class="bi bi-arrow-left"></i>
                    VOLTAR
                </a>
            </div>

            <div th:if="${erro}" class="alerta alerta-erro">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span th:text="${erro}">Mensagem de erro</span>
            </div>

            <div th:if="${sucesso}" class="alerta alerta-sucesso">
                <i class="bi bi-check-circle-fill"></i>
                <span th:text="${sucesso}">Mensagem de sucesso</span>
            </div>

            <form th:action="@{/clientes/salvar}" th:object="${cliente}" method="post">

                <input type="hidden" th:field="*{idCliente}">
                <input type="hidden" name="origem" th:value="${origem}">

                <div class="form-grid cliente-form-grid cliente-form-grid-ajustado">

                    <div class="form-group campo-nome-ajustado">
                        <label class="form-label">NOME</label>
                        <input type="text" th:field="*{nome}" class="form-input" required>
                    </div>

                    <div class="form-group campo-cpf-menor">
                        <label class="form-label">CPF</label>
                        <input type="text"
                               id="cpf"
                               th:field="*{cpf}"
                               class="form-input"
                               maxlength="14"
                               placeholder="000.000.000-00">
                    </div>

                    <div class="form-group campo-data-nascimento">
                        <label class="form-label">DATA DE NASCIMENTO</label>
                        <input type="date" th:field="*{dataNascimento}" class="form-input">
                    </div>

                    <div class="form-group campo-telefone-menor">
                        <label class="form-label">TELEFONE</label>
                        <input type="text"
                               id="telefone"
                               th:field="*{telefone}"
                               class="form-input"
                               maxlength="15"
                               placeholder="(00) 00000-0000">
                    </div>

                    <div class="form-group campo-celular-maior">
                        <label class="form-label">CELULAR</label>
                        <input type="text"
                               id="celular"
                               th:field="*{celular}"
                               class="form-input"
                               maxlength="15"
                               placeholder="(00) 00000-0000">
                    </div>

                    <div class="form-group campo-email-ajustado">
                        <label class="form-label">E-MAIL</label>
                        <input type="email"
                               th:field="*{email}"
                               class="form-input"
                               placeholder="cliente@email.com">
                    </div>

                    <div class="form-group campo-cep-menor">
                        <label class="form-label">CEP</label>
                        <input type="text"
                               id="cep"
                               th:field="*{cep}"
                               class="form-input"
                               maxlength="9"
                               placeholder="00000-000">
                    </div>

                    <div class="form-group campo-cidade-maior">
                        <label class="form-label" for="cidadeBusca">CIDADE</label>

                        <input class="form-input"
                               type="text"
                               id="cidadeBusca"
                               list="listaCidades"
                               placeholder="DIGITE A CIDADE"
                               autocomplete="off">

                        <datalist id="listaCidades">
                            <option th:each="cidadeOpcao : ${cidades}"
                                    th:value="${cidadeOpcao.nome}"
                                    th:attr="data-id=${cidadeOpcao.idCidade}, data-uf=${cidadeOpcao.uf}">
                            </option>
                        </datalist>

                        <input type="hidden"
                               id="cidade"
                               name="cidade"
                               th:value="${cliente.cidade != null ? cliente.cidade.idCidade : ''}">
                    </div>

                    <div class="form-group campo-uf-menor">
                        <label class="form-label">UF</label>
                        <input type="text" id="ufCliente" class="form-input" readonly placeholder="UF">
                    </div>

                    <div class="form-group campo-endereco-maior">
                        <label class="form-label">ENDEREÇO</label>
                        <input type="text" th:field="*{endereco}" class="form-input">
                    </div>

                    <div class="form-group campo-numero-menor">
                        <label class="form-label">NÚMERO</label>
                        <input type="text" th:field="*{numero}" class="form-input">
                    </div>

                    <div class="form-group campo-bairro-ajustado">
                        <label class="form-label">BAIRRO</label>
                        <input type="text" th:field="*{bairro}" class="form-input">
                    </div>

                </div>

                <div class="form-actions">
                    <button type="submit" class="primary-button">
                        <i class="bi bi-check-circle"></i>
                        SALVAR
                    </button>

                    <a th:href="@{/clientes}" class="secondary-button">
                        <i class="bi bi-x-circle"></i>
                        CANCELAR
                    </a>
                </div>

            </form>

        </div>
    </main>
</div>

</body>
</html>
