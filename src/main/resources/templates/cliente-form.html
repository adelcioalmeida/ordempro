<!DOCTYPE html> <html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"> <head> <meta charset="UTF-8"> <title>CADASTRO CLIENTE</title>
    <link rel="stylesheet" th:href="@{/css/sistema.css}">
    <script th:src="@{/js/sistema.js}" defer></script>
</head> <body> <div class="layout">
    <aside class="sidebar">
        <div class="sidebar-logo">
            <img class="logo-imagem" src="/img/logo.png" alt="Logo OrdemPro">
        </div>

        <nav class="sidebar-menu">
            <button class="menu-toggle active" type="button">CADASTRO</button>

            <div class="submenu aberto">
                <a class="submenu-link active" th:href="@{/clientes}">CLIENTE</a>
                <a class="submenu-link" th:href="@{/cidades}">CIDADE</a>
                <a class="submenu-link" th:href="@{/usuarios}">USUÁRIO</a>
            </div>

            <a class="sidebar-link" th:href="@{/ordens}">ORDENS DE SERVIÇO</a>
            <a class="sidebar-link sair-link" th:href="@{/logout}">SAIR</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="content-card">

            <div class="page-header">
                <h1 class="page-title"
                    th:text="${cliente.idCliente != null ? 'EDIÇÃO DE CLIENTE' : 'CADASTRO DE CLIENTE'}">
                    CADASTRO DE CLIENTE
                </h1>

                <a th:href="@{/clientes}" class="secondary-button">
                    ← VOLTAR
                </a>
            </div>

            <form th:action="@{/clientes/salvar}" th:object="${cliente}" method="post">

                <input type="hidden" th:field="*{idCliente}">
                <input type="hidden" name="origem" th:value="${origem}">

                <div class="form-grid cliente-form-grid">

                    <div class="form-group campo-nome-maior">
                        <label>NOME</label>
                        <input type="text" th:field="*{nome}" class="form-input" required>
                    </div>

                    <div class="form-group campo-cpf-menor">
                        <label>CPF</label>
                        <input type="text" id="cpf" th:field="*{cpf}" class="form-input"
                               maxlength="14" placeholder="000.000.000-00">
                    </div>

                    <div class="form-group campo-telefone-menor">
                        <label>DATA DE NASCIMENTO</label>
                        <input type="date" th:field="*{dataNascimento}" class="form-input">
                    </div>

                    <div class="form-group campo-telefone-menor">
                        <label>TELEFONE</label>
                        <input type="text" id="telefone" th:field="*{telefone}" class="form-input"
                               maxlength="15" placeholder="(00) 00000-0000">
                    </div>

                    <div class="form-group campo-telefone-menor">
                        <label>CELULAR</label>
                        <input type="text" id="celular" th:field="*{celular}" class="form-input"
                               maxlength="15" placeholder="(00) 00000-0000">
                    </div>

                    <div class="form-group campo-email-maior">
                        <label>E-MAIL</label>
                        <input type="email" th:field="*{email}" class="form-input"
                               placeholder="cliente@email.com">
                    </div>

                    <div class="form-group campo-cep-menor">
                        <label>CEP</label>
                        <input type="text" id="cep" th:field="*{cep}" class="form-input"
                               maxlength="9" placeholder="00000-000">
                    </div>

                    <div class="form-group campo-cidade-maior">
                        <label>CIDADE</label>
                        <select id="cidade" th:field="*{cidade}" class="form-select" onchange="atualizarUfCliente()">
                            <option value="">SELECIONE</option>
                            <option th:each="cidade : ${cidades}"
                                    th:value="${cidade.idCidade}"
                                    th:attr="data-uf=${cidade.uf}"
                                    th:text="${cidade.nome}">
                            </option>
                        </select>
                    </div>

                    <div class="form-group campo-cpf-menor">
                        <label>UF</label>
                        <input type="text" id="ufCliente" class="form-input" readonly placeholder="UF">
                    </div>

                    <div class="form-group campo-endereco-maior">
                        <label>ENDEREÇO</label>
                        <input type="text" th:field="*{endereco}" class="form-input">
                    </div>

                    <div class="form-group campo-numero-menor">
                        <label>NÚMERO</label>
                        <input type="text" th:field="*{numero}" class="form-input">
                    </div>

                    <div class="form-group campo-bairro-ajustado">
                        <label>BAIRRO</label>
                        <input type="text" th:field="*{bairro}" class="form-input">
                    </div>

                </div>

                <div class="form-actions">
                    <button type="submit" class="primary-button">SALVAR</button>
                    <a th:href="@{/clientes}" class="secondary-button">CANCELAR</a>
                </div>

            </form>

        </div>
    </main>
</div> </body> </html>
