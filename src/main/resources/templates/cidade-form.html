<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CADASTRO DE CIDADE</title>

    <link rel="stylesheet" th:href="@{/css/sistema.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-logo">
            <img class="logo-imagem" th:src="@{/img/logo.png}" alt="Logo OrdemPro">
        </div>

        <nav class="sidebar-menu">

            <a class="sidebar-link home-link" th:href="@{/ordens}">
                <i class="bi bi-house-door-fill"></i>
                HOME
            </a>

            <div class="menu-group" sec:authorize="hasAnyRole('ADMIN', 'GERENTE')">
                <button type="button" class="menu-toggle active" onclick="alternarSubmenu('submenu-cadastro')">
                    <i class="bi bi-person-plus-fill"></i>
                    CADASTRO
                </button>

                <div id="submenu-cadastro" class="submenu">
                    <a class="submenu-link" th:href="@{/clientes}">
                        <i class="bi bi-person-vcard"></i>
                        CLIENTE
                    </a>

                    <a class="submenu-link active" th:href="@{/cidades}">
                        <i class="bi bi-geo-alt-fill"></i>
                        CIDADE
                    </a>

                    <a class="submenu-link"
                       sec:authorize="hasRole('ADMIN')"
                       th:href="@{/usuarios}">
                        <i class="bi bi-person-gear"></i>
                        USUÁRIO
                    </a>
                </div>
            </div>

            <div class="menu-group">
                <button type="button" class="menu-toggle" onclick="alternarSubmenu('submenu-ordens')">
                    <i class="bi bi-clipboard-check-fill"></i>
                    ORDENS DE SERVIÇO
                </button>

                <div id="submenu-ordens" class="submenu">
                    <a class="submenu-link" th:href="@{/ordens}">
                        <i class="bi bi-search"></i>
                        BUSCA
                    </a>

                    <a class="submenu-link" th:href="@{/ordens/nova}">
                        <i class="bi bi-plus-circle-fill"></i>
                        NOVA
                    </a>
                </div>
            </div>

            <a class="sidebar-link sair-link" th:href="@{/logout}">
                <i class="bi bi-box-arrow-right"></i>
                SAIR
            </a>

        </nav>

        <div class="sidebar-user-card">
            <div class="sidebar-user-info">
                <i class="bi bi-person-circle"></i>

                <div>
                    <span class="sidebar-user-name"
                          th:text="${usuarioLogadoNome + ' • ' + usuarioLogadoPerfil}">
                        USUÁRIO • PERFIL
                    </span>

                    <span class="sidebar-user-profile">
                        Perfil:
                        <strong th:text="${usuarioLogadoPerfil}">PERFIL</strong>
                    </span>
                </div>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <section class="content-card">

            <div class="page-header">
                <div>
                    <h1 class="page-title">CADASTRO DE CIDADE</h1>
                </div>

                <a class="secondary-button" th:href="@{/cidades}">
                    <i class="bi bi-arrow-left-circle"></i>
                    VOLTAR
                </a>
            </div>

            <div th:if="${erro}" class="alert-error">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span th:text="${erro}"></span>
            </div>

            <div th:if="${sucesso}" class="alert-success">
                <i class="bi bi-check-circle-fill"></i>
                <span th:text="${sucesso}"></span>
            </div>

            <form th:action="@{/cidades/salvar}" th:object="${cidade}" method="post">
                <input type="hidden" th:field="*{idCidade}">

                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" for="nome">NOME DA CIDADE</label>

                        <input class="form-input"
                               type="text"
                               id="nome"
                               th:field="*{nome}"
                               placeholder="Digite o nome da cidade"
                               required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="uf">UF</label>

                        <input class="form-input"
                               type="text"
                               id="uf"
                               th:field="*{uf}"
                               maxlength="2"
                               placeholder="EX: SP"
                               required>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="primary-button">
                        <i class="bi bi-check-circle"></i>
                        SALVAR CIDADE
                    </button>

                    <a class="secondary-button" th:href="@{/cidades}">
                        <i class="bi bi-x-circle"></i>
                        CANCELAR
                    </a>
                </div>
            </form>

        </section>
    </main>
</div>

<script th:src="@{/js/sistema.js}"></script>
</body>
</html>
