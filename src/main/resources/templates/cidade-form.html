<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CADASTRO DE CIDADE</title>

    <link rel="stylesheet" th:href="@{/css/sistema.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-logo">
            <img class="logo-imagem" src="/img/logo.png" alt="Logo OrdemPro">
        </div>

        <nav class="sidebar-menu">
            <div class="menu-group">
                <button type="button" class="menu-toggle active" onclick="alternarSubmenu('submenu-cadastro')">
                    CADASTRO
                </button>

                <div id="submenu-cadastro" class="submenu aberto">
                    <a class="submenu-link" href="#">CLIENTE</a>
                    <a class="submenu-link active" th:href="@{/cidades}">CIDADE</a>
                    <a class="submenu-link" href="#">USUÁRIO</a>
                </div>
            </div>

            <div class="menu-group">
                <button type="button" class="menu-toggle" onclick="alternarSubmenu('submenu-ordens')">
                    ORDENS DE SERVIÇO
                </button>

                <div id="submenu-ordens" class="submenu">
                    <a class="submenu-link" th:href="@{/ordens}">BUSCA</a>
                    <a class="submenu-link" th:href="@{/ordens/nova}">NOVA</a>
                </div>
            </div>

            <a class="sidebar-link sair-link" th:href="@{/login}">SAIR</a>
        </nav>
    </aside>

    <main class="main-content">
        <section class="content-card">
            <div class="page-header">
                <h1 class="page-title">CADASTRO DE CIDADE</h1>

                <a class="secondary-button" th:href="@{/cidades}">
                    <i class="bi bi-arrow-left-circle"></i>
                    VOLTAR
                </a>
            </div>

            <form th:action="@{/cidades/salvar}" th:object="${cidade}" method="post">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" for="nome">NOME DA CIDADE</label>
                        <input class="form-input" type="text" id="nome" th:field="*{nome}" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="uf">UF</label>
                        <input class="form-input" type="text" id="uf" th:field="*{uf}" maxlength="2" required>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="primary-button">
                        <i class="bi bi-check-circle"></i>
                        SALVAR CIDADE
                    </button>

                    <a class="secondary-button" th:href="@{/cidades}">
                        <i class="bi bi-x-circle"></i>
                        CANCELAR
                    </a>
                </div>
            </form>
        </section>
    </main>
</div>

<script th:src="@{/js/sistema.js}"></script>
</body>
</html>
