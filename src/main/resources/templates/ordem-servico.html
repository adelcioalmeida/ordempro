<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nova Ordem de Serviço</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .mensagem {
            color: green;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .bloco {
            border: 1px solid #ccc;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .linha {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }

        .campo {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        label {
            font-weight: bold;
            margin-bottom: 5px;
        }

        input, select {
            padding: 8px;
            font-size: 14px;
        }

        button {
            padding: 10px 20px;
            font-size: 15px;
            cursor: pointer;
        }

        a {
            display: inline-block;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<h1>Nova Ordem de Serviço</h1>

<p th:if="${mensagem}" th:text="${mensagem}" class="mensagem"></p>

<form th:action="@{/ordens/salvar}" th:object="${ordemForm}" method="post">

    <div class="bloco">
        <h2>Dados da Ordem</h2>

        <div class="linha">
            <div class="campo">
                <label>Cliente:</label>
                <select th:field="*{idCliente}">
                    <option value="">Selecione</option>
                    <option th:each="cliente : ${clientes}"
                            th:value="${cliente.idCliente}"
                            th:text="${cliente.nome}">
                    </option>
                </select>
            </div>
        </div>

        <div class="linha">
            <div class="campo">
                <label>Data de Abertura:</label>
                <input type="datetime-local" th:field="*{dataAbertura}">
            </div>

            <div class="campo">
                <label>Data Prevista de Conclusão:</label>
                <input type="datetime-local" th:field="*{dataPrevistaConclusao}">
            </div>
        </div>

        <div class="linha">
            <div class="form-group">
                <label for="status">Status:</label>
                <select id="status" name="status" class="form-control" required>
                    <option value="">Selecione</option>
                    <option value="ABERTA">Aberta</option>
                    <option value="EM_ANDAMENTO">Em andamento</option>
                    <option value="FINALIZADA">Finalizada</option>
                    <option value="CANCELADA">Cancelada</option>
                </select>
            </div>

            <div class="campo">
                <label>Observação:</label>
                <input type="text" th:field="*{observacao}">
            </div>
        </div>
    </div>

    <div class="bloco">
        <h2>Item do Serviço</h2>

        <div class="linha">
            <div class="campo">
                <label>Serviço:</label>
                <select th:field="*{idServico}">
                    <option value="">Selecione</option>
                    <option th:each="servico : ${servicos}"
                            th:value="${servico.idServico}"
                            th:text="${servico.nome}">
                    </option>
                </select>
            </div>
        </div>

        <div class="linha">
            <div class="campo">
                <label>Descrição:</label>
                <input type="text" th:field="*{descricao}">
            </div>
        </div>

        <div class="linha">
            <div class="campo">
                <label>Valor:</label>
                <input type="number" step="0.01" th:field="*{valor}">
            </div>
        </div>
    </div>

    <button type="submit">Salvar Ordem de Serviço</button>
</form>

<br>
<a href="/ordens">Ver Ordens Cadastradas</a>

</body>
</html>
