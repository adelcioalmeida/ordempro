<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <div class="login-logo">
            <img src="/img/logo.png" alt="Logo OrdemPro">
        </div>

        <h1>LOGIN</h1>

        <form th:action="@{/login}" method="post" class="login-form">
            <div class="form-group">
                <label for="username">E-MAIL</label>
                <input type="text" id="username" name="username" placeholder="Digite seu e-mail" required>
            </div>

            <div class="form-group">
                <label for="password">SENHA</label>
                <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
            </div>

            <div th:if="${param.error}" class="mensagem-erro">
                E-MAIL OU SENHA INVÁLIDOS.
            </div>

            <div th:if="${param.logout}" class="mensagem-sucesso">
                VOCÊ SAIU DO SISTEMA.
            </div>

            <button type="submit" class="login-button">ENTRAR</button>
        </form>
    </div>
</div>

</body>
</html>
